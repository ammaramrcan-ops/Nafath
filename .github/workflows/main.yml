name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build and Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit
      - run: bun run build
